<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Store</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; background: #121212; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .app-card { background: #1e1e1e; width: 100%; max-width: 350px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .btn { background: #007bff; border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; min-width: 110px; transition: 0.3s; }
    .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
    .btn.installed { background: #28a745; }
    h1 { color: #007bff; }
  </style>
</head>
<body>

  <h1>PWA Apps</h1>
  <div id="app-list"></div>

  <script>
    let deferredPrompt;

    // Регистрация Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Ловим событие установки от браузера
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      renderApps(); 
    });

    async function installProcess(btn) {
      if (!deferredPrompt) return;

      // Показываем окно браузера
      deferredPrompt.prompt();
      
      const { outcome } = await deferredPrompt.userChoice;
      
      if (outcome === 'accepted') {
        btn.disabled = true;
        btn.innerText = "Загрузка...";
        
        // Ждем, когда система реально установит приложение
        window.addEventListener('appinstalled', () => {
          btn.innerText = "Установлено";
          btn.classList.add('installed');
          deferredPrompt = null;
        });
      }
    }

    async function renderApps() {
      const res = await fetch('LinksOnApps.json');
      const apps = await res.json();
      const container = document.getElementById('app-list');
      
      container.innerHTML = apps.map(app => `
        <div class="app-card">
          <strong>${app.name}</strong>
          <button class="btn" onclick="installProcess(this)">Установить</button>
        </div>
      `).join('');
    }

    renderApps();
  </script>
</body>
</html>
