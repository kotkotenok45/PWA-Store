<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Store</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --accent: #0084ff; --bg: #000; --card: #111; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
    h1 { margin: 30px 0; font-size: 24px; letter-spacing: 1px; }
    #store { width: 100%; max-width: 400px; }
    .app-card { 
      background: var(--card); border: 1px solid #222; padding: 20px; 
      border-radius: 20px; display: flex; justify-content: space-between; 
      align-items: center; margin-bottom: 15px; position: relative; overflow: hidden;
    }
    .btn { 
      background: var(--accent); border: none; color: #fff; padding: 10px 20px; 
      border-radius: 12px; cursor: pointer; font-weight: 600; min-width: 110px; z-index: 2;
    }
    .btn:disabled { background: #333; color: #777; }
    .progress { 
      position: absolute; left: 0; bottom: 0; height: 100%; width: 0%; 
      background: rgba(0, 132, 255, 0.15); transition: width 0.2s; z-index: 1;
    }
    .app-name { font-weight: bold; font-size: 18px; z-index: 2; }
  </style>
</head>
<body>

  <h1>PWA STORE</h1>
  <div id="store"></div>

  <script>
    // Регистрация SW для работы стора
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    async function loadApps() {
      const res = await fetch('LinksOnApps.json');
      const apps = await res.json();
      const container = document.getElementById('store');
      
      container.innerHTML = apps.map((app, i) => `
        <div class="app-card">
          <div class="progress" id="p${i}"></div>
          <span class="app-name">${app.name}</span>
          <button class="btn" onclick="installFlow(this, 'p${i}', '${app.url}')">Установить</button>
        </div>
      `).join('');
    }

    function installFlow(btn, progId, url) {
      btn.disabled = true;
      btn.innerText = "Загрузка...";
      const bar = document.getElementById(progId);
      
      let w = 0;
      const timer = setInterval(() => {
        w += Math.random() * 20;
        if (w >= 100) {
          w = 100;
          clearInterval(timer);
          // Перенаправляем игру с сигналом установки
          setTimeout(() => {
            window.location.href = url + "?install=true";
          }, 300);
        }
        bar.style.width = w + "%";
      }, 150);
    }

    loadApps();
  </script>
</body>
</html>
